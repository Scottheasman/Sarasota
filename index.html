<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florida Day Trip Planner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1923 0%, #1a2d40 50%, #0f1923 100%);
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
      color: #e8edf2;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const initialStops = [
      { id: 0, label: "Home", travel: 0, wait: 0, icon: "🏠", isOrigin: true },
      { id: 1, label: "Miccosukee Service Plaza – Alligator Alley", travel: 50, wait: 0, icon: "🐊" },
      { id: 2, label: "Tesla Supercharger – Miromar Outlets", travel: 65, wait: 0, icon: "⚡" },
      { id: 3, label: "Wellen Park Farmers Market", travel: 70, wait: 0, icon: "🌿" },
      { id: 4, label: "Taylor Morrison – Skye Ranch", travel: 35, wait: 0, icon: "🏡" },
      { id: 5, label: "Lakewood Ranch Farmers Market", travel: 26, wait: 0, icon: "🥕" },
      { id: 6, label: "Art Ovation Hotel", travel: 26, wait: 0, icon: "🎨" },
    ];

    function toMinutes(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    }

    function toDisplay(totalMins) {
      const h = Math.floor(totalMins / 60) % 24;
      const m = totalMins % 60;
      const ampm = h >= 12 ? "pm" : "am";
      const displayH = h % 12 === 0 ? 12 : h % 12;
      return `${displayH}:${String(m).padStart(2, "0")}${ampm}`;
    }

    function toInputValue(totalMins) {
      const h = Math.floor(totalMins / 60) % 24;
      const m = totalMins % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function formatDuration(mins) {
      if (!mins) return null;
      if (mins < 60) return `${mins} min`;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return m === 0 ? `${h} hr` : `${h} hr ${m} min`;
    }

    function TripPlanner() {
      const [stops, setStops] = useState(initialStops);
      const [departureMins, setDepartureMins] = useState(7 * 60);

      const { arrivals, departures } = stops.reduce(
        (acc, stop, i) => {
          if (i === 0) {
            acc.arrivals.push(departureMins);
            acc.departures.push(departureMins + (stop.wait || 0));
          } else {
            const arrive = acc.departures[i - 1] + stop.travel;
            acc.arrivals.push(arrive);
            acc.departures.push(arrive + (stop.wait || 0));
          }
          return acc;
        },
        { arrivals: [], departures: [] }
      );

      function handleTravelChange(idx, val) {
        setStops(prev => prev.map((s, i) => i === idx ? { ...s, travel: Math.max(1, parseInt(val) || 1) } : s));
      }
      function handleWaitChange(idx, val) {
        setStops(prev => prev.map((s, i) => i === idx ? { ...s, wait: Math.max(0, parseInt(val) || 0) } : s));
      }
      function handleLabelChange(idx, val) {
        setStops(prev => prev.map((s, i) => i === idx ? { ...s, label: val } : s));
      }
      function addStop() {
        setStops(prev => [...prev, { id: Date.now(), label: "New Stop", travel: 30, wait: 0, icon: "📍" }]);
      }
      function removeStop(idx) {
        setStops(prev => prev.filter((_, i) => i !== idx));
      }

      const totalDrive = stops.slice(1).reduce((s, st) => s + st.travel, 0);
      const totalWait = stops.reduce((s, st) => s + (st.wait || 0), 0);

      return (
        <div style={{ minHeight: "100vh", padding: "32px 16px" }}>
          <div style={{ maxWidth: 560, margin: "0 auto" }}>

            {/* Header */}
            <div style={{ marginBottom: 32, textAlign: "center" }}>
              <div style={{ fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: "#4fc3f7", marginBottom: 8, fontWeight: 600 }}>
                Road Trip Planner
              </div>
              <h1 style={{ fontSize: 26, fontWeight: 700, color: "#fff", letterSpacing: "-0.02em" }}>
                Florida Day Trip
              </h1>
            </div>

            {/* Departure control */}
            <div style={{
              background: "rgba(79,195,247,0.08)", border: "1px solid rgba(79,195,247,0.25)",
              borderRadius: 14, padding: "16px 20px", marginBottom: 20,
              display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16
            }}>
              <div>
                <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#4fc3f7", fontWeight: 600, marginBottom: 4 }}>
                  Departure Time
                </div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#fff" }}>
                  {toDisplay(departureMins)}
                </div>
              </div>
              <input
                type="time"
                value={toInputValue(departureMins)}
                onChange={e => setDepartureMins(toMinutes(e.target.value))}
                style={{
                  background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.15)",
                  borderRadius: 8, padding: "8px 12px", color: "#fff", fontSize: 15, cursor: "pointer", outline: "none"
                }}
              />
            </div>

            {/* Stops */}
            <div>
              {stops.map((stop, i) => {
                const hasWait = (stop.wait || 0) > 0;
                const isLast = i === stops.length - 1;
                return (
                  <div key={stop.id}>
                    {/* Travel connector */}
                    {i > 0 && (
                      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "4px 0", marginLeft: 40 }}>
                        <div style={{
                          width: 2, minHeight: 24, alignSelf: "stretch",
                          background: "linear-gradient(to bottom, rgba(79,195,247,0.3), rgba(79,195,247,0.1))",
                          borderRadius: 2, flexShrink: 0
                        }} />
                        <div style={{
                          display: "flex", alignItems: "center", gap: 8,
                          background: "rgba(255,255,255,0.04)", borderRadius: 20, padding: "4px 12px", fontSize: 12
                        }}>
                          <span>🚗</span>
                          <input
                            type="number" min={1} value={stop.travel}
                            onChange={e => handleTravelChange(i, e.target.value)}
                            style={{
                              background: "transparent", border: "none", color: "#b0bec5",
                              fontSize: 12, width: 36, textAlign: "center", outline: "none"
                            }}
                          />
                          <span style={{ color: "#546e7a", fontSize: 11 }}>min drive</span>
                          <span style={{ color: "#4fc3f7", fontSize: 11, fontWeight: 600 }}>{formatDuration(stop.travel)}</span>
                        </div>
                      </div>
                    )}

                    {/* Stop card */}
                    <div style={{
                      background: i === 0 ? "rgba(79,195,247,0.06)" : "rgba(255,255,255,0.04)",
                      border: i === 0 ? "1px solid rgba(79,195,247,0.2)" : "1px solid rgba(255,255,255,0.07)",
                      borderRadius: 12, padding: "14px 16px", position: "relative"
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                        <div style={{
                          width: 36, height: 36, borderRadius: "50%",
                          background: i === 0 ? "rgba(79,195,247,0.15)" : "rgba(255,255,255,0.06)",
                          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0
                        }}>
                          {stop.icon}
                        </div>

                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 10, color: "#546e7a", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 2 }}>
                            {i === 0 ? "Start" : `Stop ${i}`}
                          </div>
                          <input
                            value={stop.label}
                            onChange={e => handleLabelChange(i, e.target.value)}
                            style={{
                              background: "transparent", border: "none", color: "#ecf0f1",
                              fontSize: 13, fontWeight: 500, outline: "none", width: "100%", padding: 0
                            }}
                          />
                        </div>

                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontSize: 10, color: "#546e7a", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 2 }}>
                            {i === 0 ? "Depart" : "Arrive"}
                          </div>
                          <div style={{ fontSize: 18, fontWeight: 700, color: i === 0 ? "#4fc3f7" : "#fff", letterSpacing: "-0.02em" }}>
                            {toDisplay(arrivals[i])}
                          </div>
                          {hasWait && i > 0 && (
                            <div style={{ fontSize: 11, color: "#f59e0b", marginTop: 2 }}>
                              Leave {toDisplay(departures[i])}
                            </div>
                          )}
                        </div>
                      </div>

                      {/* Remove button */}
                      {i > 0 && (
                        <button onClick={() => removeStop(i)} style={{
                          position: "absolute", top: 8, right: 8,
                          background: "transparent", border: "none",
                          color: "#37474f", cursor: "pointer", fontSize: 14, padding: 2, lineHeight: 1
                        }}>✕</button>
                      )}

                      {/* Wait time row */}
                      {!isLast && (
                        <div style={{
                          marginTop: 10, paddingTop: 10, borderTop: "1px solid rgba(255,255,255,0.05)",
                          display: "flex", alignItems: "center", gap: 10
                        }}>
                          <span style={{ fontSize: 12, color: "#546e7a" }}>⏱ Time at stop:</span>
                          <div style={{
                            display: "flex", alignItems: "center", gap: 6,
                            background: hasWait ? "rgba(245,158,11,0.1)" : "rgba(255,255,255,0.04)",
                            border: hasWait ? "1px solid rgba(245,158,11,0.25)" : "1px solid transparent",
                            borderRadius: 20, padding: "3px 10px"
                          }}>
                            <input
                              type="number" min={0} value={stop.wait || ""} placeholder="0"
                              onChange={e => handleWaitChange(i, e.target.value)}
                              style={{
                                background: "transparent", border: "none",
                                color: hasWait ? "#f59e0b" : "#78909c",
                                fontSize: 12, width: 36, textAlign: "center", outline: "none"
                              }}
                            />
                            <span style={{ fontSize: 11, color: hasWait ? "#f59e0b" : "#546e7a" }}>
                              min{hasWait ? ` · ${formatDuration(stop.wait)}` : ""}
                            </span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Add stop */}
            <button
              onClick={addStop}
              onMouseEnter={e => { e.target.style.borderColor = "rgba(79,195,247,0.3)"; e.target.style.color = "#4fc3f7"; }}
              onMouseLeave={e => { e.target.style.borderColor = "rgba(255,255,255,0.12)"; e.target.style.color = "#546e7a"; }}
              style={{
                width: "100%", marginTop: 16, padding: "12px",
                background: "transparent", border: "1px dashed rgba(255,255,255,0.12)",
                borderRadius: 12, color: "#546e7a", fontSize: 13, cursor: "pointer"
              }}
            >+ Add Stop</button>

            {/* Summary */}
            <div style={{
              marginTop: 24, padding: "14px 20px",
              background: "rgba(255,255,255,0.03)", borderRadius: 12,
              border: "1px solid rgba(255,255,255,0.06)",
              display: "flex", justifyContent: "space-between",
              flexWrap: "wrap", gap: 8, fontSize: 12, color: "#546e7a"
            }}>
              <span>🚗 Drive: <strong style={{ color: "#b0bec5" }}>{formatDuration(totalDrive)}</strong></span>
              {totalWait > 0 && (
                <span>⏱ Stops: <strong style={{ color: "#f59e0b" }}>{formatDuration(totalWait)}</strong></span>
              )}
              <span>🏁 Done: <strong style={{ color: "#4fc3f7" }}>{toDisplay(arrivals[arrivals.length - 1])}</strong></span>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TripPlanner />);
  </script>
</body>
</html>
